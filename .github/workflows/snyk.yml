name: Snyk Security Scan

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk-code:
    name: Snyk Code (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk Code test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test --severity-threshold=high

  snyk-open-source:
    name: Snyk Open Source (dependencies)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # PRコメント投稿に必要
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk Open Source test
        id: snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high > snyk_output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat snyk_output.txt

      - name: Post result to PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file snyk_output.txt

      - name: Fail workflow if vulnerabilities found
        if: steps.snyk.outputs.exit_code != '0'
        run: exit 1